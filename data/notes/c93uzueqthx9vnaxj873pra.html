<p>Represent a class of hydrocarbons, distinct from <a title="Private" href="https://wiki.dendron.so/notes/hfyvYGJZQiUwQaaxQO27q.html" target="_blank" class="private">aromatic compounds (Private)</a>, which can be saturated (<code>C-C</code> bonds are all single and hydrogens are needed). Aliphatic bonds can also be unsaturated with double bonds or triple bonds. </p>
